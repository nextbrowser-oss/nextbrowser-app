name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Sync version from tag
        if: github.ref_type == 'tag'
        run: node scripts/sync-version.mjs ${{ github.ref_name }}
      - name: Configure macOS signing
        # Only export CSC_*/APPLE_* when a certificate secret is actually set.
        # An empty CSC_LINK still counts as "defined" and makes electron-builder
        # try to read a cert from an empty path, which fails the build — so we
        # must leave it unset for unsigned builds rather than pass empty strings.
        #   MAC_CSC_LINK                 base64 of the Developer ID .p12
        #   MAC_CSC_KEY_PASSWORD         password for that .p12
        #   MAC_IDENTITY                 "Developer ID Application: NAME (TEAMID)"
        #   APPLE_ID / APPLE_TEAM_ID     Apple account + team for notarization
        #   APPLE_APP_SPECIFIC_PASSWORD  app-specific password for notarization
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            echo "Signing certificate present — signing + notarization enabled."
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            } >> "$GITHUB_ENV"
          else
            echo "No signing certificate — building ad-hoc signed (unsigned distribution)."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi
      - run: npm test
      - name: Build macOS app
        env:
          MAC_IDENTITY: ${{ secrets.MAC_IDENTITY }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            # Signed release: override the package.json ad-hoc identity ("-")
            # with the real Developer ID so the cert is actually used.
            npm run dist:mac -- -c.mac.identity="$MAC_IDENTITY"
          else
            # Unsigned release: package.json identity "-" makes electron-builder
            # re-sign the bundle ad-hoc, which yields a valid signature (the
            # normal "unidentified developer" gate) instead of a broken one that
            # macOS reports as "damaged".
            npm run dist:mac
          fi
      - name: Publish macOS build
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          fail_on_unmatched_files: true
          generate_release_notes: true
      - uses: actions/upload-artifact@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          name: NextBrowser-macOS
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Sync version from tag
        if: github.ref_type == 'tag'
        run: node scripts/sync-version.mjs ${{ github.ref_name }}
      - run: npm test
      - run: npm run dist:win
      - name: Publish NSIS installer
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          fail_on_unmatched_files: true
      - uses: actions/upload-artifact@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          name: NextBrowser-Windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
