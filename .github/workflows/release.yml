name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Sync version from tag
        if: github.ref_type == 'tag'
        run: node scripts/sync-version.mjs ${{ github.ref_name }}
      - name: Require macOS distribution credentials
        if: github.ref_type == 'tag'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_IDENTITY: ${{ secrets.MAC_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            MAC_CSC_LINK \
            MAC_CSC_KEY_PASSWORD \
            MAC_IDENTITY \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required macOS release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
      - name: Configure macOS signing
        # Only export CSC_*/APPLE_* when a certificate secret is actually set.
        # An empty CSC_LINK still counts as "defined" and makes electron-builder
        # try to read a cert from an empty path, which fails the build — so we
        # must leave it unset for unsigned builds rather than pass empty strings.
        #   MAC_CSC_LINK                 base64 of the Developer ID .p12
        #   MAC_CSC_KEY_PASSWORD         password for that .p12
        #   MAC_IDENTITY                 "Developer ID Application: NAME (TEAMID)"
        #   APPLE_ID / APPLE_TEAM_ID     Apple account + team for notarization
        #   APPLE_APP_SPECIFIC_PASSWORD  app-specific password for notarization
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            echo "Signing certificate present — signing + notarization enabled."
            {
              echo "CSC_LINK=$MAC_CSC_LINK"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
              echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
            } >> "$GITHUB_ENV"
          else
            echo "No signing certificate — building an ad-hoc signed manual artifact."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi
      - run: npm test
      - name: Build macOS app
        env:
          MAC_IDENTITY: ${{ secrets.MAC_IDENTITY }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            # Signed release: override the package.json ad-hoc identity ("-")
            # with the real Developer ID so the cert is actually used.
            npm run dist:mac -- -c.mac.identity="$MAC_IDENTITY"
          else
            # Unsigned release: package.json identity "-" makes electron-builder
            # re-sign the bundle ad-hoc, which yields a valid signature (the
            # normal "unidentified developer" gate) instead of a broken one that
            # macOS reports as "damaged". Tagged releases cannot enter this path.
            npm run dist:mac
          fi
      - name: Verify macOS distribution trust
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          app_path="$(find release -mindepth 2 -maxdepth 2 -type d -name 'NextBrowser.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "Packaged macOS app was not found." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          signature_info="$(codesign -dv --verbose=4 "$app_path" 2>&1)"
          printf '%s\n' "$signature_info"

          if ! grep -q '^Authority=Developer ID Application:' <<<"$signature_info"; then
            echo "App is not signed with a Developer ID Application certificate." >&2
            exit 1
          fi
          if grep -q '^Signature=adhoc$' <<<"$signature_info"; then
            echo "Ad-hoc signatures are not allowed in tagged releases." >&2
            exit 1
          fi
          if grep -q '^TeamIdentifier=not set$' <<<"$signature_info"; then
            echo "Signed app does not have an Apple team identifier." >&2
            exit 1
          fi

          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
      - name: Publish macOS build
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          fail_on_unmatched_files: true
          generate_release_notes: true
      - uses: actions/upload-artifact@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          name: NextBrowser-macOS
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Sync version from tag
        if: github.ref_type == 'tag'
        run: node scripts/sync-version.mjs ${{ github.ref_name }}
      - run: npm test
      - run: npm run dist:win
      - name: Publish NSIS installer
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          fail_on_unmatched_files: true
      - uses: actions/upload-artifact@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          name: NextBrowser-Windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
